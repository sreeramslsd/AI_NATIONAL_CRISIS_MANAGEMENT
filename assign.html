<!DOCTYPE html>
<html>
<head>
  <title>Assign Emergency Team</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;

      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url("/static/images/aerial-top-view-of-highway-junction-interchange-road-drone-view-of-the-elevated-road-traffic-junctions-and-green-garden-transport-trucks-and-cars-driving-on-highway-infrastructure-in-moder.jpg");

      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #ff4d4d;
      text-align: center;
      padding: 20px;
      margin: 0;
      font-size: 2.5em;
      text-shadow: 0 0 15px #ff4d4d;
    }

    .container {
      display: flex;
      justify-content: space-around;
      width: 90%;
      padding: 20px;
      gap: 20px;
    }

    /* 🔥 GLASS CARD */
    .box {
      background: rgba(255, 255, 255, 0.08);  /* transparent */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 25px;
      width: 45%;

      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);

      transition: 0.3s;
    }

    .box:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(255, 77, 77, 0.4);
    }

    .map-container {
      width: 100%;
      height: 500px;
      border-radius: 15px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
    }

    .team-assignment {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* 🔥 GLASS BUTTON CARDS */
    .team {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;

      border: 1px solid rgba(255,255,255,0.2);
    }

    .team:hover {
      background: rgba(255, 77, 77, 0.7);
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(255,77,77,0.8);
    }

    .team h3 {
      margin: 0;
      font-size: 1.4em;
    }

    input[type="text"] {
      width: calc(100% - 22px);
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background-color: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1em;
    }

    input::placeholder {
      color: #ccc;
    }

    #assignment-details {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      border: 1px solid rgba(255,77,77,0.5);
      display: none;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<h2>🚑 Emergency Assignment Command Center</h2>

<div class="container">

  <!-- MAP -->
  <div class="box">
    <h3>🗺 Emergency Services Map</h3>

    <input type="text" id="cityInput"
           placeholder="Enter City (e.g Vijayawada)"
           onchange="updateMap()">

    <div class="map-container">
      <iframe id="map"
        src="https://maps.google.com/maps?q=Vijayawada%20hospital&output=embed">
      </iframe>
    </div>
  </div>

  <!-- TEAM -->
  <div class="box">
    <h3>🚨 Assign Emergency Teams</h3>

    <div class="team-assignment">

      <div class="team" onclick="assignTeam('Fire Station','🔥')">
        <h3>🔥 Fire Department</h3>
      </div>

      <div class="team" onclick="assignTeam('Ambulance Service','🚑')">
        <h3>🚑 Ambulance</h3>
      </div>

      <div class="team" onclick="assignTeam('Police Station','🚓')">
        <h3>🚓 Police</h3>
      </div>

      <div class="team" onclick="assignTeam('Disaster Response Team','🌪️')">
        <h3>🌪 Crisis Management</h3>
      </div>

    </div>

    <div id="assignment-details"></div>
  </div>

</div>

<script>

function updateMap(query="hospital"){

  let city = document.getElementById('cityInput').value;

  if(!city){
    city = "Vijayawada";
  }

  document.getElementById('map').src =
    `https://maps.google.com/maps?q=${city}+${query}&output=embed`;
}

function assignTeam(team, icon){

  let city = document.getElementById('cityInput').value;

  if(!city){
    alert("Enter city first");
    return;
  }

  updateMap(team);

  let details = document.getElementById('assignment-details');

  details.innerHTML = `
    <h3>${icon} ${team} Assigned</h3>
    <p><strong>Location:</strong> ${city}</p>
    <p><strong>Status:</strong> Team Dispatched</p>
    <p><strong>ETA:</strong> 5 minutes</p>
  `;

  details.style.display = "block";
}

</script>

<script>
function assignTeam(team, icon) {
  var city = document.getElementById('cityInput').value;

  if (!city) {
    alert("Please enter a city first.");
    return;
  }

  updateMap(team);

  var detailsDiv = document.getElementById('assignment-details');
  detailsDiv.innerHTML = `
    <h3>${icon} ${team} Assigned</h3>
    <p>Sending alert to emergency team...</p>
  `;
  detailsDiv.style.display = 'block';

  // 🔥 CALL FLASK BACKEND TO SEND SMS
  fetch("/send_sms", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      city: city,
      team: team
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      detailsDiv.innerHTML += `<p style="color:lightgreen;">✅ SMS Sent Successfully</p>`;
    } else {
      detailsDiv.innerHTML += `<p style="color:red;"> Out of credentials: ${data.error} : Free Limit Reached</p>`;
    }
  })
  .catch(() => {
    detailsDiv.innerHTML += `<p style="color:red;">❌ Server Error</p>`;
  });
}
</script>

</body>
</html>
